          <div class="text-center mt-4">
            <button onclick="makePayment();" class="btn" style="width:80%; background:linear-gradient(45deg,#b52f2f,#e07b3a); color:white; border-radius:20px; font-size:1.1rem; padding:10px;">
              Make Payment
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

</section>
{% load static %}
<script src="{% static 'menu/js/cart_script.js' %}"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>function makePayment() {
    var allowedZipCodes = ['110092', '110051', '110032', '110053', '110091', '110094', '110095', '110031', '110096', '110093'];
    var enteredZipCode = $('#zip').val().trim();
    var totalAmount = parseInt($('#hiddenPrice').val(), 10) || 0;

    if (!data || Object.keys(data).length === 0) {
        alert("Your cart is empty.");
        return;
    }

    if (!(allowedZipCodes.includes(enteredZipCode))) {
        alert("Delivery is not available for the entered zip code.");
        return;
    }

    if (totalAmount <= 0) {
        alert("Invalid cart amount. Please refresh the cart and try again.");
        return;
    }

    $.ajax({
        url: "/menu/make-payments/",
        type: 'GET',
        data: {
            'total_amt': totalAmount
        },
        success: function (res) {
           var options = {
                "key": res.key,
                "amount": res.payment.amount,
                "currency": "INR",
                "name": "Delicious Kitchen",
                "description": "Pay your Order",
                "order_id": res.payment.id,
                "handler": function (response) {

                    $.ajax({
                        url: "/menu/order-complete/",
                        type: 'POST',
                        data: {
                            'fullName': $('#fullName').val(),
                            'address': $('#adr').val(),
                            'city': $('#city').val(),

                            'zip': enteredZipCode,
                            'email': $('#email').val(),
                            'phone_num': $('#ph').val(),
                            'cart_items': JSON.stringify(data),
                            'totalPrice': $('#hiddenPrice').val(),
                            'payment_id': response.razorpay_payment_id,
                            'order_id': response.razorpay_order_id,
                            'order_signature': response.razorpay_signature,
                            'csrfmiddlewaretoken': '{{ csrf_token }}',
                        },
                        success: function (response) {
                            localStorage.removeItem('selectedItems');
                            window.location.href = "/menu/success/";
                        },
                        error: function (xhr) {
                            var response = xhr.responseJSON || {};
                            alert(response.error || "Failed to place order. Please try again.");
                        }
                    });
                },
            };

            var rzp1 = new Razorpay(options);
            rzp1.on('payment.failed', function (response) {
                var error = response.error || {};
                alert(error.description || "Payment failed. Use Razorpay test details such as success@razorpay in test mode.");
            });
            rzp1.open();
        },
        error: function (xhr) {
            var response = xhr.responseJSON || {};
            alert(response.error || "Could not start payment. Please try again.");
        }
    });
}
</script>
<script>
    function scrollToSection() {
    var total_Cart_price = parseInt($("#totalPrice").text().replace(/[^0-9]/g, ""), 10) || 0;
    $('#hiddenPrice').val(total_Cart_price);
    // Get the target section by its ID
    var targetSection = document.getElementById("scrollTarget");

    // Calculate the Y position of the target section relative to the document
    var targetPosition = targetSection.offsetTop;

    // Smoothly scroll to the target section
    window.scrollTo({
        top: targetPosition,
        behavior: 'smooth'  // Use smooth scrolling behavior
    });
}

</script>
{% endblock %}
